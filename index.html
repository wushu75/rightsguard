*{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{height:100%;}

.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.b-new{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#EF4444;}
.b-progress{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#F59E0B;}
.b-review{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);color:#818CF8;}
.b-resolved{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#22C55E;}
.b-cold{background:rgba(255,255,255,.04);border:1px solid var(--rule);color:var(--silver-mid);}

/* BUTTONS */
.act-btn{padding:6px 12px;border-radius:7px;background:var(--teal-dim);border:1px solid var(--teal-border);font-size:11px;font-weight:400;color:var(--teal);cursor:pointer;font-family:'Geist',sans-serif;transition:all .2s;white-space:nowrap;}
.act-btn:hover{background:var(--teal);color:var(--obsidian);}
.btn-teal{padding:9px 18px;border-radius:9px;background:var(--teal);border:none;font-size:13px;font-weight:400;color:var(--obsidian);cursor:pointer;font-family:'Geist',sans-serif;letter-spacing:.04em;transition:all .2s;}
.btn-teal:hover{background:#00D4B8;transform:translateY(-1px);}
.btn-teal:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-outline{padding:8px 16px;border-radius:8px;background:transparent;border:1px solid var(--rule);font-size:12px;color:var(--silver);cursor:pointer;font-family:'Geist',sans-serif;transition:all .2s;}
.btn-outline:hover{border-color:rgba(255,255,255,.18);color:var(--cream);}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--silver-mid);}
.fi{padding:9px 12px;background:var(--slate);border:1px solid rgba(255,255,255,.08);border-radius:8px;font-family:'Geist',sans-serif;font-size:13px;color:var(--cream);outline:none;transition:border-color .2s;width:100%;}
.fi:focus{border-color:var(--teal-border);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(10,15,20,.88);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-box{background:var(--charcoal);border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;width:100%;box-shadow:0 40px 80px rgba(0,0,0,.7);animation:slideUp .3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.modal-bar{height:3px;background:linear-gradient(to right,var(--teal),#4DB8AB,var(--teal));}
.modal-inner{padding:26px;}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-family:'Instrument Serif',serif;font-size:20px;font-weight:400;color:var(--cream);}
.modal-close{width:28px;height:28px;border-radius:7px;cursor:pointer;background:var(--slate);border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--silver);transition:all .2s;flex-shrink:0;}
.modal-close:hover{border-color:rgba(239,68,68,.3);color:var(--red);}

/* TOAST */
.toast-wrap{position:fixed;top:70px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--charcoal);border:1px solid var(--teal-border);border-radius:10px;padding:11px 15px;display:flex;align-items:center;gap:9px;box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:all;animation:toastIn .3s ease both;min-width:240px;}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.toast-icon{font-size:15px;}
.toast-text{font-size:12px;font-weight:300;color:var(--cream);flex:1;}
.toast-x{cursor:pointer;color:var(--silver-mid);font-size:14px;flex-shrink:0;}

@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.4;}}

@media(max-width:900px){
